<body data-page="guestbook">
<div id="authBox" class="auth-corner ltr"></div>
<div class="grain"></div>

<div class="statusbar">
  <div class="statusbar-inner">
    <a class="sb-session" href="index.html">6p</a>
    <nav class="sb-tabs">
      <a class="sb-tab" data-page="home" href="index.html"><span data-i18n="nav.home">home</span></a>
      <a class="sb-tab" data-page="about" href="about.html"><span data-i18n="nav.about">about</span></a>

      <a class="sb-tab" data-page="guestbook" href="guestbook.html"><span data-i18n="nav.guestbook">guestbook</span></a>
    </nav>
    <div class="sb-right">
      <div class="sb-clock" id="clock">--:--</div>
      <a class="design-switch" href="ghost/guestbook.html">bento</a>
      <button id="themeToggle" type="button">light</button>
      <button id="langToggle" type="button">AR</button>
    </div>
  </div>

<main>
  <section class="pane">
    <div class="wrap reveal">
      <h1 class="page-title" data-i18n="guestbook.title">guestbook</h1>
      <div class="card">
        <form class="gb-form ltr" id="gbForm">
          <input type="text" id="gbHp" name="website" autocomplete="off" tabindex="-1" aria-hidden="true" style="position:absolute; left:-9999px; width:1px; height:1px; opacity:0;">
          <input type="text" id="gbName" data-i18n-placeholder="gb.name.placeholder" placeholder="your name" maxlength="40" required>
          <textarea id="gbMsg" data-i18n-placeholder="gb.msg.placeholder" placeholder="your message…" rows="3" maxlength="300" required></textarea>
          <button type="submit" data-i18n="gb.submit">sign the guestbook</button>
        </form>
        <div id="gbNotice" class="status-fallback ltr" style="margin-top:10px;"></div>
      </div>

      <div class="card ltr">
        <div id="gbList"></div>
      </div>
    </div>
  </section>
</main>

<footer class="ltr">
  <div class="footer-links">
    <a href="https://github.com/6p99" target="_blank" rel="noopener">GitHub</a>

  <div class="ltr" style="margin-top:10px; font-size:11px; color:var(--dimmer);">
